<!DOCTYPE html>
<html>

        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Open+Sans:wght@300;400;700&display=swap" rel="stylesheet">
        <link href="../assets/css/reset.css" rel="stylesheet">

<body>
    <header class="head container">

        <img class="head__logo" src="../assets/img/dos-logos.png" alt="Logo Municipalidad La Lima">
        <nav class="head__navegacion">
            <ul>
                <li class="head__enlace"><a href="../index.html">Home</a></li>
                <li class="head__enlace"><a href="#footer">Contacto</a></li>
            </ul>
        </nav>

    <main>

    <section class="llamada container">
        <h1 class="llamada__titulo">Municipalidad de La Lima, Cortés</h1>
        <p class="llamada__texto">¡Devolviendo tus Impuestos en obras!</p>
        <!--<a class="llamada__boton boton" href="#">Conozca los planes</a>-->
    </section>

    <section class="bitacora" id="bitacora">

    <h1 class="bitacora-titulo">¡Realiza tus pagos más facíl!</h1>

    <label for="filtro">Buscar:</label>
    <input type="text" class="text" id="filtro" placeholder="Ingrese los caracteres iniciales">

    <table id="tabla-bitacora">
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Fecha</th>
                <th>No. Catastral</th>
                <th>Ubicación</th>
                <th>Nombre Contribuyente</th>
                <th>No. Identidad</th>
                <th>Tipo de Trabajo</th>
                <th>Responsables</th>
                <th>Resolución de Trabajo</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- Aquí se agregarán las filas de la tabla dinámicamente -->
        </tbody>
    </table>

    <div class="container-arriba">
        <a href="#bitacora">
            <!--<img class="boton-arriba" src="../assets/img/ARRIBA.png" alt="Icono HASTA ARRIBA">-->
        </a>
    </div>

    </section>  

    <footer class="footer container" id="footer">
        <img src="../assets/img/logo-blanco.png" alt="Logo Municipalidad" class="footer__logo">
        <ul class="footer__social">
            <li><a href="#" class="footer__midia"><img src="../assets/img/facebook.png" alt="Ícono de Facebook"></a></li>
            <li><a href="#" class="footer__midia"><img src="../assets/img/youtube.png" alt="Ícono de Instagram"></a></li>
            <li><a href="#" class="footer__midia"><img src="../assets/img/correo.png" alt="Ícono de Twitter"></a></li>
        </ul>
        <nav>
            <ul class="footer__navegacion">
                <li class="head__enlace"><a href="../index.html">Home</a></li>
                <li class="head__enlace"><a href="#footer">Contacto</a></li>
            </ul>
        </nav>
    </footer>

    <script src="../assets/js/pagos.js"></script>
